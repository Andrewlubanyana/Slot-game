<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>My First Slot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game">
    <div id="ui">
      <div>Balance: <span id="balance">100.00</span></div>
      <div>Bet: <span id="bet">1.00</span></div>
      <div>Win: <span id="win">0.00</span></div>
    </div>
    <canvas id="reels" width="500" height="300"></canvas>
    <button id="spin-btn">SPIN</button>
    <div id="message"></div>
  </div>
  <script type="module" src="src/game.js"></script>
</body>
</html>
